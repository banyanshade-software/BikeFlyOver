<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>BikeFlyOver POC</title>
    <link rel="stylesheet" href="../../node_modules/cesium/Build/Cesium/Widgets/widgets.css" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./cesium-bootstrap.js"></script>
    <script src="../../node_modules/cesium/Build/Cesium/Cesium.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">BikeFlyOver</p>
          <h1>Phase 5 - Follow camera</h1>
        </div>
        <p id="status" class="status">Initializing Cesium...</p>
      </header>
      <main class="viewer-layout">
        <aside class="summary-panel" aria-label="Track summary">
          <h2>Sample activity</h2>
          <dl id="summaryList" class="summary-list">
            <div>
              <dt>File</dt>
              <dd>Loading...</dd>
            </div>
            <div>
              <dt>Trackpoints</dt>
              <dd>-</dd>
            </div>
            <div>
              <dt>Start</dt>
              <dd>-</dd>
            </div>
            <div>
              <dt>End</dt>
              <dd>-</dd>
            </div>
            <div>
              <dt>Bounds</dt>
              <dd>-</dd>
            </div>
            <div>
              <dt>Altitude</dt>
              <dd>-</dd>
            </div>
            <div>
              <dt>Route</dt>
              <dd id="routeStatus">Waiting for render...</dd>
            </div>
          </dl>
          <section class="controls-panel" aria-label="Playback controls">
            <h2>Playback</h2>
            <div class="button-row">
              <button id="playPauseButton" type="button">Pause</button>
              <button id="restartButton" type="button">Restart</button>
            </div>
            <dl class="summary-list summary-list--compact">
              <div>
                <dt>Status</dt>
                <dd id="playbackStatus">Loading...</dd>
              </div>
              <div>
                <dt>Progress</dt>
                <dd id="playbackProgress">-</dd>
              </div>
              <div>
                <dt>Current time</dt>
                <dd id="playbackCurrentTime">-</dd>
              </div>
              <div>
                <dt>Speed</dt>
                <dd id="playbackSpeed">-</dd>
              </div>
            </dl>
          </section>
          <section class="controls-panel" aria-label="Camera controls">
            <h2>Camera</h2>
            <div class="button-row">
              <button id="cameraModeButton" type="button">Switch to overview</button>
            </div>
            <dl class="summary-list summary-list--compact">
              <div>
                <dt>Mode</dt>
                <dd id="cameraModeStatus">Loading...</dd>
              </div>
            </dl>
          </section>
        </aside>
        <section id="cesiumContainer" class="viewer-panel" aria-label="Cesium viewer"></section>
      </main>
    </div>
    <script src="./renderer.js"></script>
  </body>
</html>
